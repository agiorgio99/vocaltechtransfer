name: vocaltechtransfer
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.9
  - pip

  # Core scientific stack
  - numpy
  - scipy
  - matplotlib
  - scikit-learn

  # Notebooks
  - jupyterlab
  - ipython
  - ipykernel

  # Audio I/O
  - soundfile

  # PyTorch CPU — sufficient for EnCodec encoding/decoding
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly

  - pip:
    - transformers
    - safetensors
    - datasets
    - accelerate
    - descript-audio-codec

variables:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  LANG: "en_US.UTF-8"
